name: Deploy Test

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-test
  cancel-in-progress: true

jobs:
  deploy-test:
    name: deploy-test
    runs-on: ubuntu-latest
    environment: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Deploy to test VPS and run smoke-check
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_DIR: ${{ secrets.TEST_VPS_APP_DIR }}
          ADMIN_TELEGRAM_ID: ${{ secrets.TEST_ADMIN_TELEGRAM_ID }}
          SERVICE_TELEGRAM_BOT_TOKEN: ${{ secrets.TEST_SERVICE_TELEGRAM_BOT_TOKEN }}
          DEPLOY_RESTART_COMMAND: ${{ secrets.TEST_DEPLOY_RESTART_COMMAND }}
          TEST_BACKEND_BASE_URL: ${{ secrets.TEST_BACKEND_BASE_URL }}
        with:
          host: ${{ secrets.TEST_VPS_HOST }}
          username: ${{ secrets.TEST_VPS_USER }}
          key: ${{ secrets.TEST_VPS_SSH_KEY }}
          port: ${{ secrets.TEST_VPS_PORT }}
          fingerprint: ${{ secrets.TEST_VPS_HOST_FINGERPRINT }}
          script_stop: true
          envs: APP_DIR,ADMIN_TELEGRAM_ID,SERVICE_TELEGRAM_BOT_TOKEN,DEPLOY_RESTART_COMMAND,TEST_BACKEND_BASE_URL
          script: |
            set -euo pipefail

            if [ -z "${APP_DIR}" ] || [ -z "${ADMIN_TELEGRAM_ID}" ] || [ -z "${DEPLOY_RESTART_COMMAND}" ] || [ -z "${TEST_BACKEND_BASE_URL}" ]; then
              echo "Required deploy secrets are missing."
              exit 1
            fi

            cd "${APP_DIR}"
            git fetch --prune origin
            git pull --ff-only origin main

            npm ci --prefix backend
            npm ci --prefix frontend
            npm run build --prefix backend
            npm run build --prefix frontend

            export NODE_ENV=test
            export ADMIN_TELEGRAM_ID
            export DISABLE_TG_AUTH=true
            if [ -n "${SERVICE_TELEGRAM_BOT_TOKEN}" ]; then
              export SERVICE_TELEGRAM_BOT_TOKEN
            else
              unset SERVICE_TELEGRAM_BOT_TOKEN
            fi

            eval "${DEPLOY_RESTART_COMMAND}"

            curl --fail --silent --show-error "${TEST_BACKEND_BASE_URL}/health"
            curl --fail --silent --show-error "${TEST_BACKEND_BASE_URL}/backoffice/orders"

            node <<'NODE'
            const path = require("node:path");
            const runtimeModulePath = path.join(process.cwd(), "backend", "dist", "identity-access", "config", "access-config.js");
            const { ConfigValidationError, loadAccessConfig } = require(runtimeModulePath);

            try {
              loadAccessConfig({
                NODE_ENV: "production",
                ADMIN_TELEGRAM_ID: process.env.ADMIN_TELEGRAM_ID,
                DISABLE_TG_AUTH: "true"
              });
              console.error("Expected production-like bypass to be rejected.");
              process.exit(1);
            } catch (error) {
              if (!(error instanceof ConfigValidationError)) {
                throw error;
              }
            }
            NODE
