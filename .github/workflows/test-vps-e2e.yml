name: Test E2E Stand Preflight

on:
  workflow_dispatch:

concurrency:
  group: test-e2e-stand-preflight
  cancel-in-progress: false

jobs:
  test-e2e-stand-preflight:
    name: test-e2e-stand-preflight
    runs-on: ubuntu-latest
    environment: test
    steps:
      - name: Run non-canonical e2e stand preflight on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_DIR: ${{ secrets.TEST_VPS_APP_DIR }}
          ENV_FILE: ${{ secrets.TEST_E2E_VPS_ENV_FILE }}
          TEST_E2E_BASE_URL: https://${{ vars.TEST_E2E_PUBLIC_HOSTNAME }}
        with:
          host: ${{ secrets.TEST_VPS_HOST }}
          username: ${{ secrets.TEST_VPS_USER }}
          key: ${{ secrets.TEST_VPS_SSH_KEY }}
          port: ${{ secrets.TEST_VPS_PORT }}
          fingerprint: ${{ secrets.TEST_VPS_HOST_FINGERPRINT }}
          script_stop: true
          envs: APP_DIR,ENV_FILE,TEST_E2E_BASE_URL
          script: |
            set -euo pipefail

            if [ -z "${APP_DIR}" ] || [ -z "${ENV_FILE}" ] || [ -z "${TEST_E2E_BASE_URL}" ]; then
              echo "Required test-e2e preflight contract values are missing."
              exit 1
            fi

            cd "${APP_DIR}"

            if [ ! -x scripts/run-test-vps-e2e.sh ]; then
              chmod +x scripts/run-test-vps-e2e.sh
            fi

            ./scripts/run-test-vps-e2e.sh --preflight-only
