name: deploy-feature001

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target_environment:
        description: GitHub Environment for deployment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - test
          - production
      git_ref:
        description: Git ref or commit SHA to deploy. Use a previous successful SHA for recovery.
        required: false
        default: ""
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && inputs.target_environment || 'staging' }}

    env:
      TARGET_ENVIRONMENT: ${{ github.event_name == 'workflow_dispatch' && inputs.target_environment || 'staging' }}
      TARGET_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.git_ref || github.sha }}
      VPS_APP_DIR: ${{ vars.VPS_APP_DIR }}
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
      ADMIN_TELEGRAM_ID: ${{ secrets.ADMIN_TELEGRAM_ID }}
      TG_BACKOFFICE_BOT_TOKEN: ${{ secrets.TG_BACKOFFICE_BOT_TOKEN }}
      BACKOFFICE_PUBLIC_URL: ${{ vars.BACKOFFICE_PUBLIC_URL }}
      SERVER_PORT: ${{ vars.SERVER_PORT || '3000' }}
      BACKOFFICE_PORT: ${{ vars.BACKOFFICE_PORT || '8080' }}
      VITE_APP_TITLE: ${{ vars.VITE_APP_TITLE || 'Expressa Backoffice' }}
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || '/api' }}
      DISABLE_TG_AUTH: ${{ vars.DISABLE_TG_AUTH || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_REF }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run server tests
        run: npm test --workspace @expressa/server

      - name: Run backoffice tests
        run: npm run test --workspace @expressa/backoffice-web

      - name: Build server
        run: npm run build --workspace @expressa/server

      - name: Build backoffice
        run: npm run build --workspace @expressa/backoffice-web

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        run: npm run test:e2e

      - name: Prepare SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${VPS_SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${VPS_HOST}" >> ~/.ssh/known_hosts

      - name: Sync repository to VPS
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            ./ "${VPS_USER}@${VPS_HOST}:${VPS_APP_DIR}/"

      - name: Render VPS env files
        run: |
          ssh "${VPS_USER}@${VPS_HOST}" "mkdir -p '${VPS_APP_DIR}/infra/docker'"
          cat <<EOF | ssh "${VPS_USER}@${VPS_HOST}" "cat > '${VPS_APP_DIR}/infra/docker/.env'"
          SERVER_PORT=${SERVER_PORT}
          BACKOFFICE_PORT=${BACKOFFICE_PORT}
          VITE_APP_TITLE=${VITE_APP_TITLE}
          VITE_API_BASE_URL=${VITE_API_BASE_URL}
          VITE_DISABLE_TG_AUTH=${DISABLE_TG_AUTH}
          VITE_TEST_TELEGRAM_ID=
          EOF
          cat <<EOF | ssh "${VPS_USER}@${VPS_HOST}" "cat > '${VPS_APP_DIR}/infra/docker/.env.server'"
          ADMIN_TELEGRAM_ID=${ADMIN_TELEGRAM_ID}
          DISABLE_TG_AUTH=${DISABLE_TG_AUTH}
          TG_BACKOFFICE_BOT_TOKEN=${TG_BACKOFFICE_BOT_TOKEN}
          PORT=3000
          EOF

      - name: Deploy on VPS
        run: ssh "${VPS_USER}@${VPS_HOST}" "cd '${VPS_APP_DIR}' && bash infra/scripts/deploy-feature001.sh"

      - name: Run post-deploy smoke-check
        env:
          SMOKE_MODE: ${{ env.DISABLE_TG_AUTH == 'true' && 'test' || 'working' }}
          SMOKE_BASE_URL: ${{ env.BACKOFFICE_PUBLIC_URL }}
          SMOKE_ADMIN_TELEGRAM_ID: ${{ env.ADMIN_TELEGRAM_ID }}
          SMOKE_TEST_TELEGRAM_ID: ${{ env.ADMIN_TELEGRAM_ID }}
          SMOKE_TG_BACKOFFICE_BOT_TOKEN: ${{ env.TG_BACKOFFICE_BOT_TOKEN }}
        run: npm run smoke:backoffice-access
