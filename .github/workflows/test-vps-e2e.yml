name: Test VPS E2E

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run preflight only or preflight plus QA-owned e2e command."
        required: true
        default: "preflight"
        type: choice
        options:
          - preflight
          - run
      e2e_command:
        description: "QA-owned e2e command. Required when mode is run."
        required: false
        type: string

concurrency:
  group: test-vps-e2e
  cancel-in-progress: false

jobs:
  test-vps-e2e:
    name: test-vps-e2e
    runs-on: ubuntu-latest
    environment: test
    steps:
      - name: Validate inputs
        run: |
          set -euo pipefail

          if [ "${{ inputs.mode }}" = "run" ] && [ -z "${{ inputs.e2e_command }}" ]; then
            echo "e2e_command is required when mode is run."
            exit 1
          fi

      - name: Encode QA-owned command
        if: ${{ inputs.mode == 'run' }}
        id: encode-command
        env:
          E2E_COMMAND_INPUT: ${{ inputs.e2e_command }}
        run: |
          set -euo pipefail
          echo "e2e_command_b64=$(printf '%s' "$E2E_COMMAND_INPUT" | base64 -w0)" >> "$GITHUB_OUTPUT"

      - name: Run Test VPS e2e route
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_DIR: ${{ secrets.TEST_VPS_APP_DIR }}
          ENV_FILE: ${{ secrets.TEST_VPS_ENV_FILE }}
          TEST_SMOKE_BACKEND_BASE_URL: ${{ secrets.TEST_SMOKE_BACKEND_BASE_URL }}
          BACKOFFICE_PUBLIC_URL: ${{ vars.BACKOFFICE_PUBLIC_URL }}
          SERVER_PORT: ${{ vars.SERVER_PORT }}
          TEST_E2E_MODE: ${{ inputs.mode }}
          TEST_E2E_COMMAND_B64: ${{ steps.encode-command.outputs.e2e_command_b64 }}
        with:
          host: ${{ secrets.TEST_VPS_HOST }}
          username: ${{ secrets.TEST_VPS_USER }}
          key: ${{ secrets.TEST_VPS_SSH_KEY }}
          port: ${{ secrets.TEST_VPS_PORT }}
          fingerprint: ${{ secrets.TEST_VPS_HOST_FINGERPRINT }}
          script_stop: true
          envs: APP_DIR,ENV_FILE,TEST_SMOKE_BACKEND_BASE_URL,BACKOFFICE_PUBLIC_URL,SERVER_PORT,TEST_E2E_MODE,TEST_E2E_COMMAND_B64
          script: |
            set -euo pipefail

            if [ -z "${APP_DIR}" ]; then
              echo "TEST_VPS_APP_DIR is required."
              exit 1
            fi

            cd "${APP_DIR}"

            if [ ! -x scripts/run-test-vps-e2e.sh ]; then
              chmod +x scripts/run-test-vps-e2e.sh
            fi

            if [ "${TEST_E2E_MODE}" = "preflight" ]; then
              ./scripts/run-test-vps-e2e.sh --preflight-only
            else
              ./scripts/run-test-vps-e2e.sh
            fi
