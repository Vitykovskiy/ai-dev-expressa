name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run server tests
        run: npm test --workspace @expressa/server

      - name: Run backoffice tests
        run: npm run test --workspace @expressa/backoffice-web

      - name: Build server
        run: npm run build --workspace @expressa/server

      - name: Build backoffice
        run: npm run build --workspace @expressa/backoffice-web

  deployment-validation:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare Docker Compose env files
        run: |
          cp infra/docker/.env.example infra/docker/.env
          cp infra/docker/.env.server.example infra/docker/.env.server

      - name: Validate deployment compose
        run: npm run deploy:feature001:config

      - name: Start server for working smoke-check
        env:
          ADMIN_TELEGRAM_ID: 750001
          DISABLE_TG_AUTH: "false"
          TG_BACKOFFICE_BOT_TOKEN: bot-token
        run: npm run start:dev --workspace @expressa/server &

      - name: Run working smoke-check
        env:
          SMOKE_BASE_URL: http://127.0.0.1:3000
          SMOKE_ADMIN_TELEGRAM_ID: 750001
          SMOKE_TG_BACKOFFICE_BOT_TOKEN: bot-token
        run: npm run smoke:backoffice-access

      - name: Stop server after working smoke-check
        if: always()
        run: pkill -f "ts-node src/main.ts" || true

      - name: Start server for test-mode smoke-check
        env:
          ADMIN_TELEGRAM_ID: 750001
          DISABLE_TG_AUTH: "true"
          PORT: 3000
        run: npm run start:dev --workspace @expressa/server &

      - name: Run test-mode smoke-check
        env:
          SMOKE_BASE_URL: http://127.0.0.1:3000
          SMOKE_MODE: test
          SMOKE_ADMIN_TELEGRAM_ID: 750001
          SMOKE_TEST_TELEGRAM_ID: 750001
        run: npm run smoke:backoffice-access

      - name: Stop server after test-mode smoke-check
        if: always()
        run: pkill -f "ts-node src/main.ts" || true
