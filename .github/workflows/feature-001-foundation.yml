name: feature-001-foundation

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  foundation:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck foundation slice
        run: npm run typecheck:feature-001

      - name: Test foundation slice
        run: npm run test:feature-001

      - name: Build foundation slice
        run: npm run build:feature-001

      - name: Smoke foundation runtime
        run: npm run smoke:feature-001
